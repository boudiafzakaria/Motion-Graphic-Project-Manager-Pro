  <style>
    /* Styling variables and custom utilities */
    :root {
      --gold-primary: #aa8246;
      --gold-glow: rgba(170, 130, 70, 0.15);
      --border-glow: rgba(170, 130, 70, 0.08);
      --glow-light: rgba(255, 255, 255, 0.015);
    }

    body {
      background-color: #030406;
      background-image: 
        radial-gradient(circle at 5% 5%, rgba(170, 130, 70, 0.05) 0%, transparent 35%),
        radial-gradient(circle at 95% 95%, rgba(170, 130, 70, 0.04) 0%, transparent 40%),
        linear-gradient(to bottom, rgba(3, 4, 6, 0.5), #030406);
    }

    /* custom scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #030406;
    }
    ::-webkit-scrollbar-thumb {
      background: #11141a;
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--gold-primary);
    }

    /* Glassmorphism premium card utility */
    .glass-card {
      background: rgba(9, 11, 15, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.035);
      box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.01);
      backdrop-filter: blur(14px) saturate(110%);
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-card:hover {
      border-color: rgba(170, 130, 70, 0.15);
      box-shadow: 0 16px 36px -8px rgba(0, 0, 0, 0.95), inset 0 1px 1px rgba(170, 130, 70, 0.02);
    }

    /* Smooth Input transition effects */
    input, textarea, select {
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1) !important;
    }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(170, 130, 70, 0.45) !important;
      box-shadow: 0 0 14px rgba(170, 130, 70, 0.08) !important;
      background-color: rgba(4, 5, 7, 0.95) !important;
    }

    /* Shake Error animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .shake-anim {
      animation: shake 0.4s ease-in-out;
    }

    /* Soft pulse glow */
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }
    .accent-bg-glow {
      animation: glow-pulse 3s infinite ease-in-out;
    }

    /* Print styles */
    @media print {
      body {
        background: #ffffff !important;
        color: #000000 !important;
        background-image: none !important;
      }
      .no-print {
        display: none !important;
      }
      .print-only {
        display: block !important;
      }
      .glass-card {
        background: #ffffff !important;
        border: 1px solid #cbd5e1 !important;
        box-shadow: none !important;
        color: #000000 !important;
        backdrop-filter: none !important;
      }
      table {
        width: 100% !important;
        border-collapse: collapse !important;
      }
      th {
        background: #f1f5f9 !important;
        color: #000000 !important;
        border: 1px solid #cbd5e1 !important;
      }
      td {
        border: 1px solid #cbd5e1 !important;
        color: #000000 !important;
        background: transparent !important;
      }
      /* Ensure text is dark and clear */
      span, p, strong, div, h1, h2, h3, h4, td, th {
        color: #000000 !important;
      }
    }
    
    .print-only {
      display: none;
    }

    /* Animation for version highlight */
    @keyframes pulse-slow {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .animate-pulse-slow {
      animation: pulse-slow 3s infinite ease-in-out;
    }

    /* Side drawer animations */
    .drawer-transition {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }
  </style>
</head>

    // Load active campaigns dataset from storage key
    function initDatabase() {
      const stored = safeStorage.getItem(DB_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (parsed && Array.isArray(parsed.projects)) {
            state.projects = parsed.projects;
            return;
          }
        } catch (e) {
          console.error("Invalid database cache.", e);
        }
      }
      // Load seed database when empty
      state.projects = JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
      saveDatabase();
    }

    function saveDatabase() {
      safeStorage.setItem(DB_KEY, JSON.stringify({ projects: state.projects }));
    }

    // Custom alerts toast
    function triggerToast(title, message, type = "success") {
      state.toast = { title, message, type };
      render();
      setTimeout(() => {
        if (state.toast && state.toast.title === title) {
          state.toast = null;
          render();
        }
      }, 4500);
    }

    // Session authorization pipeline
    function checkSession() {
      const stored = safeStorage.getItem(SESSION_KEY);
      if (stored) {
        try {
          const session = JSON.parse(stored);
          const maxAge = 24 * 60 * 60 * 1000; // 24 hours validity
          if (session.authenticated && (Date.now() - session.timestamp) < maxAge) {
            state.isAuthenticated = true;
          } else {
            safeStorage.removeItem(SESSION_KEY);
          }
        } catch {
          safeStorage.removeItem(SESSION_KEY);
        }
      }
    }

    // Forwards and backwards compatible debrief array getter
    function getProjectDebriefs(p) {
      if (p.debriefs && Array.isArray(p.debriefs)) {
        return p.debriefs.filter(Boolean);
      }
      const legacy = [];
      if (p.debreif01) legacy.push(p.debreif01);
      if (p.debreif02) legacy.push(p.debreif02);
      if (p.debreif03) legacy.push(p.debreif03);
      return legacy;

    // Project date calculations helper to compute warns and stats
    function computeCampaignMetrics(p) {
      const now = new Date();
      now.setHours(0, 0, 0, 0);

      const parseToLocalMidnight = (dateStr) => {
        if (!dateStr) return null;
        const cleanStr = dateStr.trim();
        
        let year, monthIndex, day;
        let delimiter = "";
        
        if (cleanStr.includes("-")) delimiter = "-";
        else if (cleanStr.includes("/")) delimiter = "/";
        
        if (delimiter) {
          const parts = cleanStr.split(delimiter);
          if (parts.length === 3) {
            if (parts[0].length === 4) {
              // YYYY-MM-DD or YYYY/MM/DD
              year = parseInt(parts[0], 10);
              monthIndex = parseInt(parts[1], 10) - 1;
              day = parseInt(parts[2], 10);
            } else if (parts[2].length === 4) {
              // DD-MM-YYYY or DD/MM/YYYY
              year = parseInt(parts[2], 10);
              monthIndex = parseInt(parts[1], 10) - 1;
              day = parseInt(parts[0], 10);
            } else {
              year = parseInt(parts[0], 10);
              monthIndex = parseInt(parts[1], 10) - 1;
              day = parseInt(parts[2], 10);
            }
          }
        }
        
        if (year !== undefined && !isNaN(year) && !isNaN(monthIndex) && !isNaN(day)) {
          return new Date(year, monthIndex, day, 0, 0, 0, 0);
        }
        
        const parsed = new Date(cleanStr);
        if (!isNaN(parsed.getTime())) {
          parsed.setHours(0, 0, 0, 0);
          return parsed;
        }
        return null;
      };

      const reception = parseToLocalMidnight(p.dateReception) || now;
      const deadline = parseToLocalMidnight(p.deadline) || now;

      const totalSpan = deadline.getTime() - reception.getTime();
      const remainingTime = deadline.getTime() - now.getTime();
      
      // Calculate inclusive days: reception day to deadline day inclusive -> difference + 1
      const totalDays = Math.max(0, Math.round(totalSpan / (1000 * 60 * 60 * 24)) + 1);
      const remainingDays = Math.round(remainingTime / (1000 * 60 * 60 * 24));

      // Calculate real percentage progress between reception and deadline based on browser computer date
      let percentage = 0;
      if (p.isCompleted) {
        percentage = 100;
      } else {
        if (totalSpan > 0) {
          const elapsed = now.getTime() - reception.getTime();
          percentage = Math.max(0, Math.min(100, Math.round((elapsed / totalSpan) * 100)));
        } else {
          percentage = 100;
        }
      }

      if (p.isCompleted) {
        return { status: "completed", percentage: 100, remainingText: "", color: "emerald", label: "metricCompleted", totalDays, remainingDays: 0 };
      }

      if (remainingTime < 0) {
        const overdueDays = Math.abs(remainingDays);
        return {
          status: "overdue",
          percentage,
          remainingText: overdueDays === 1 ? "dayOverdue" : "daysOverdue",
          dayCount: overdueDays,
          color: "rose",
          label: "metricOverdue",
          totalDays,
          remainingDays
        };
      }

      const urgencyRatio = remainingTime / Math.max(1, totalSpan);
      let status = "safe";
      let color = "emerald";
      let label = "metricSafe";

      if (remainingDays === 0) {
        status = "urgent";
        color = "amber";
        label = "dueToday";
      } else if (remainingDays <= 3 || urgencyRatio <= 0.3) {
        status = "urgent";
        color = "amber";
        label = "metricUrgent";
      } else if (urgencyRatio <= 0.6) {
        status = "warning";
        color = "cyan";
        label = "metricWarning";
      }

      return {
        status,
        percentage,
        remainingText: remainingDays === 1 ? "dayRemaining" : "daysRemaining",
        dayCount: remainingDays,
        color,
        label,
        totalDays,
        remainingDays
      };
    }

    // Dynamic stats computation
    function getSummaryStats() {
      const stats = { total: state.projects.length, active: 0, completed: 0, urgent: 0, overdue: 0 };
      
      state.projects.forEach(p => {
        if (p.isCompleted) {
          stats.completed++;
        } else {
          stats.active++;
          const calc = computeCampaignMetrics(p);
          if (calc.status === "overdue") {
            stats.overdue++;
          } else if (calc.status === "urgent") {
            stats.urgent++;
          }
        }
      });

      return stats;
    }

    function formatRemainingDays(count) {
      const padded = String(Math.abs(count)).padStart(2, '0');
      if (count < 0) {

      } else if (count === 0) {
        return `00 days remaining`;
      } else if (count === 1) {

    // Master filter pipeline
    function getFilteredAndSortedProjects() {
      let result = state.projects.filter(p => {
        const query = state.searchQuery.toLowerCase().trim();
        const matchSearch = !query || 
          p.chefDeProjet.toLowerCase().includes(query) ||
          p.motion.toLowerCase().includes(query) ||
          p.autreInformation.toLowerCase().includes(query) ||
          p.lienProjet.toLowerCase().includes(query) ||
          p.deadline.includes(query);

        const matchPM = state.filterPM === "ALL" || p.chefDeProjet === state.filterPM;
        const matchArtist = state.filterArtist === "ALL" || p.motion === state.filterArtist;
        const matchTag = state.currentVersion !== "B" || state.filterTag === "ALL" || (p.tags && p.tags.includes(state.filterTag));

        return matchSearch && matchPM && matchArtist && matchTag;
      });

      // Execute sort
      result.sort((a, b) => {
        let valA = a[state.sortField] || "";
        let valB = b[state.sortField] || "";
        if (typeof valA === "string") {
          valA = valA.toLowerCase();
          valB = valB.toLowerCase();
        }
        if (valA < valB) return state.sortAsc ? -1 : 1;
        if (valA > valB) return state.sortAsc ? 1 : -1;
        return 0;
      });

      return result;
    }

    // Database JSON restore backup
    function importDatabase(input) {
      if (!input.files || input.files.length === 0) return;
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const parsed = JSON.parse(e.target.result);
          if (parsed && Array.isArray(parsed.projects)) {
            // Verify structural properties of imported metrics
            const validated = parsed.projects.filter(p => p && typeof p.chefDeProjet === "string" && typeof p.motion === "string");
            
            // Format or generate IDs for validated imports
            validated.forEach(p => {
              if (!p.id) {
                p.id = `proj_${Date.now()}_${Math.random().toString(36).substring(2, 7)}`;
              }
            });

            // Merge strategy: update existing by ID, insert brand new ones at the beginning
            const projectMap = {};
            state.projects.forEach(p => {
              projectMap[p.id] = p;
            });

            let addedCount = 0;
            validated.forEach(p => {
              if (!projectMap[p.id]) {
                addedCount++;
              }
              projectMap[p.id] = p;
            });

            const mergedProjects = [];
            // Keep existing projects in original relative position, but updated
            state.projects.forEach(p => {
              mergedProjects.push(projectMap[p.id]);
            });
            // Prepended new imports
            validated.forEach(p => {
              if (!state.projects.some(ep => ep.id === p.id)) {
                mergedProjects.unshift(p);
              }
            });

            state.projects = mergedProjects;
            saveDatabase();
            triggerToast("Import Complete", `Merged ${validated.length} campaigns (${addedCount} new, ${validated.length - addedCount} updated).`, "success");
            render();
          } else {
            triggerToast("Import Failed", "Format structure not identified.", "error");
          }
        } catch (err) {
          triggerToast("Import Failed", "Invalid JSON data uploaded.", "error");
        }
      };
      reader.readAsText(file);
      input.value = "";
    }

                            <span class="text-obsidian-450 block truncate font-mono text-[9px]">${lg.metrics}</span>
                          </div>
                          <span class="text-[8.5px] font-mono text-obsidian-550 shrink-0 mt-0.5">${new Date(lg.timestamp).toLocaleTimeString()}</span>
                        </div>
                      `).join('')}
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        `;

        // Side details Drawer drawer implementation
        if (state.selectedProjectForDrawerId) {
          const detailProj = state.projects.find(p => p.id === state.selectedProjectForDrawerId);
          if (detailProj) {
            const m = computeCampaignMetrics(detailProj);
            const detailDebriefs = getProjectDebriefs(detailProj);
            
            let statusText = detailProj.isCompleted ? "Delivered Record" : "Active Campaign";
            let badgeStyle = detailProj.isCompleted ? "bg-emerald-550/10 text-emerald-400 border-emerald-555/20" : "bg-cyan-500/10 text-cyan-400 border-cyan-500/20";
            
            drawerHtml = `
              <!-- Click mask screen blocker overlay -->
              <div class="fixed inset-0 bg-obsidian-950/80 backdrop-blur-sm z-50 flex justify-end no-print cursor-pointer" onclick="state.selectedProjectForDrawerId = null; render();">
                <!-- Slide right aligned panel card -->
                <div class="max-w-md w-full bg-obsidian-950 border-l border-white/[0.08] h-full p-6 space-y-6 flex flex-col justify-between overflow-y-auto shadow-2xl cursor-default relative" 
                     onclick="event.stopPropagation();">
                  
                  <div class="space-y-6">
                    <!-- Drawer Header bar -->
                    <div class="flex items-center justify-between border-b border-white/[0.04] pb-4">
                      <div class="space-y-1.5">
                        <span class="border rounded-lg px-2.5 py-0.5 text-[8.5px] font-mono font-bold tracking-widest uppercase ${badgeStyle}">
                          ${statusText}
                        </span>
                        <h2 class="text-sm font-mono font-black text-transparent bg-clip-text bg-gradient-to-r from-gold-100 to-gold-400 uppercase tracking-widest leading-tight">
                          Campaign Parameters
                        </h2>
                      </div>
                      <button onclick="state.selectedProjectForDrawerId = null; render();" class="text-obsidian-500 hover:text-white transition p-1.5 text-lg leading-none bg-white/[0.02] hover:bg-white/[0.08] rounded-xl border border-white/5 font-mono select-none">
                        &#x2715;
                      </button>
                    </div>

                    <!-- PM and Designer metadata info sheet -->
                    <div class="grid grid-cols-2 gap-4 font-sans">
                      <div class="p-4 bg-obsidian-900/60 border border-white/[0.04] rounded-xl space-y-1">
                        <span class="text-[9px] font-mono font-bold text-obsidian-450 uppercase tracking-widest block">${tActive.labelPM}</span>
                        <span class="text-xs font-bold text-white block truncate">${detailProj.chefDeProjet}</span>
                      </div>
                      <div class="p-4 bg-obsidian-900/60 border border-white/[0.04] rounded-xl space-y-1">
                        <span class="text-[9px] font-mono font-bold text-obsidian-450 uppercase tracking-widest block">${tActive.labelArtist}</span>
                        <span class="text-xs font-bold text-white block truncate">${detailProj.motion}</span>
                      </div>
                    </div>

                    <!-- Process dates details checklist -->
                    <div class="space-y-4 border-b border-white/[0.04] pb-5">
                      <h4 class="text-[9.5px] font-mono font-bold text-obsidian-400 uppercase tracking-widest border-b border-white/[0.04] pb-2 select-none">
                        📅 Timelines & Metrics
                      </h4>
                      <div class="space-y-2 font-mono text-xs">
                        <div class="flex justify-between items-center bg-obsidian-900/40 p-3 rounded-lg border border-white/[0.03]">
                          <span class="text-obsidian-400 font-sans font-medium">${tActive.labelReceived}:</span>
                          <span class="text-white font-semibold">${cleanDateFormat(detailProj.dateReception)}</span>
                        </div>
                        <div class="flex justify-between items-center bg-obsidian-900/40 p-3 rounded-lg border border-white/[0.03]">
                          <span class="text-obsidian-400 font-sans font-medium">${tActive.labelDeadline}:</span>
                          <span class="text-rose-450 font-bold">${cleanDateFormat(detailProj.deadline)}</span>
                        </div>
                        <div class="flex justify-between items-center bg-obsidian-900/40 p-3 rounded-lg border border-white/[0.03]">
                          <span class="text-obsidian-400 font-sans font-medium">Timeline count:</span>
                          <span class="text-gold-450 font-extrabold uppercase text-[11px]">${formatRemainingDays(m.remainingDays)}</span>
                        </div>
                        <div class="flex justify-between items-center bg-obsidian-900/40 p-3 rounded-lg border border-white/[0.03]">
                          <span class="text-obsidian-400 font-sans font-medium">Total span size:</span>
                          <span class="text-white font-bold">${m.totalDays} Days</span>
                        </div>
                      </div>
                    </div>

                    <!-- Debrief Gates milestones progress checklist -->
                    <div class="space-y-4">
                      <h4 class="text-[9.5px] font-mono font-bold text-obsidian-400 uppercase tracking-widest border-b border-white/[0.04] pb-2 select-none">
                        🚩 Debrief Gates Checklist
                      </h4>
                      <div class="space-y-2">
                        ${detailDebriefs.length === 0 ? `
                          <p class="text-xs text-obsidian-550 italic bg-obsidian-900/30 p-4 border border-dashed border-white/[0.04] rounded-xl text-center font-sans select-none">
                            No active milestones defined.
                          </p>
                        ` : detailDebriefs.map((dt, idx) => `
                          <div class="flex items-center gap-3 bg-obsidian-900/40 p-3 rounded-xl border border-white/[0.03] font-mono text-xs">
                            <div class="w-5 h-5 rounded-full bg-emerald-500/10 text-emerald-400 flex items-center justify-center font-bold text-[9.5px] select-none">✔</div>
                            <div class="grow flex justify-between">
                              <span class="text-obsidian-350 font-sans font-bold">Gate ${idx+1}</span>
                              <span class="text-gold-450 select-all font-bold">${cleanDateFormat(dt)}</span>
                            </div>
                          </div>
                        `).join('')}
                      </div>
                    </div>

                    <!-- Custom labels display segment -->
                    ${detailProj.tags && detailProj.tags.length > 0 ? `
                      <div class="space-y-4">
                        <h4 class="text-[10px] font-bold text-obsidian-400 uppercase tracking-widest border-b border-white/5 pb-1 select-none">
                          🏷️ Active Tags & Categorization
                        </h4>
                        <div class="flex flex-wrap gap-1.5 pt-1.5">
                          ${detailProj.tags.map(tag => {
                            return `<span class="px-2.5 py-1 rounded-full text-xs font-bold uppercase tracking-wider select-none ${getTagClass(tag)}">${tag}</span>`;
                          }).join('')}
                        </div>
                      </div>
                    ` : ""}

                    <!-- Notes texts segment -->
                    ${detailProj.autreInformation ? `
                      <div class="space-y-2 font-sans">
                        <h4 class="text-[10px] font-bold text-obsidian-400 uppercase tracking-widest border-b border-white/5 pb-1 select-none">
                          📝 Campaign Notes & Instructions
                        </h4>
                        <div class="bg-obsidian-900 border border-white/5 rounded-xl p-4 text-[11.5px] leading-relaxed text-obsidian-300 max-h-45 overflow-y-auto pr-1">
                          ${detailProj.autreInformation.replace(/\n/g, '<br/>')}
                        </div>
                      </div>
                    ` : ""}

                    <!-- Folder path copying utilities -->
                    ${detailProj.lienProjet ? `
                      <div class="space-y-2 text-xs font-sans">
                        <span class="text-[9px] font-bold text-obsidian-450 uppercase tracking-widest block">${tActive.labelFolder}</span>
                        <div onclick="copyText('${detailProj.lienProjet.replace(/\\/g, '\\\\')}');" 
                             class="p-3 bg-obsidian-900 border border-white/5 hover:border-gold-500/20 active:bg-gold-500/5 hover:text-white text-obsidian-300 rounded-xl font-mono text-[11px] truncate flex items-center justify-between cursor-pointer transition flex justify-between">
                          <span class="truncate block pr-2">${detailProj.lienProjet}</span>
                          <span class="text-gold-400 text-[10px] shrink-0 font-bold uppercase select-none font-sans">Copy</span>
                        </div>
                      </div>
                    ` : ""}
                  </div>

                  <!-- Bottom CTA edit or delete button controls -->
                  <div class="grid grid-cols-2 gap-3 pt-6 border-t border-white/5 mt-6 font-sans">
                    <button onclick="activateEditFromDrawer('${detailProj.id}');" class="py-2.5 bg-gradient-to-r from-gold-500 to-gold-600 hover:from-gold-600 hover:to-gold-700 text-obsidian-950 text-xs font-bold uppercase rounded-xl transition flex items-center justify-center gap-1.5 shadow-lg shadow-gold-500/5">
                      <span>🖊️ Edit Campaign</span>
                    </button>
                    <button onclick="deleteActiveCampaignById('${detailProj.id}');" class="py-2.5 bg-rose-500/10 border border-rose-500/20 text-rose-450 hover:bg-rose-500/25 text-xs font-bold uppercase rounded-xl transition flex items-center justify-center gap-1.5">
                      <span>🗑️ Delete Campaign</span>
                    </button>
                  </div>

                </div>
              </div>
            `;
          }
        }
      }

      if (state.showRegisterModal) {
        registerModalHtml = `
          <div class="fixed inset-0 bg-obsidian-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4 no-print animate-fade-in animate-duration-200" onclick="state.showRegisterModal = false; render();">
            <!-- Modal body wrapping form elements with click preservation -->
            <div class="w-full max-w-lg max-h-[90vh] overflow-y-auto relative shadow-2xl rounded-2xl" onclick="event.stopPropagation();">
              ${formHtml}
            </div>
          </div>
        `;
      }

      const bodyWorkspace = `
        <div class="max-w-[1800px] mx-auto px-6 md:px-8 py-6 space-y-6">
          
          <!-- Unified Statistics metrics and tools bar -->
          ${statsHtml}

          ${analyticsDashboardBHtml}

          ${ganttChartHtml}

          ${advancedSimulationsHtml}

          <!-- Controls Layout: Interactive Filters with Integrated Register Button -->
          <div class="w-full no-print">
            ${filterBarsHtml}
          </div>

          <!-- 📊 Data Grid Table / Kanban (Full Page Width) -->
          <div class="w-full">
            ${worksheetDetailsHtml}
          </div>

        </div>
      `;

      // Static Custom system Alerts banner
      let toastHtml = "";
      if (state.toast) {
        const style = state.toast.type === 'success' ? 'border-gold-500/20 bg-obsidian-900/90 text-gold-300' : 'border-rose-500/20 bg-obsidian-900/90 text-rose-300';
        const vectorIcon = icons[state.toast.type] || icons.success;
        toastHtml = `
          <div class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-5 py-3.5 border rounded-2xl shadow-xl backdrop-blur-md max-w-sm w-full mx-auto animate-bounce ${style}">
            <div class="shrink-0">${vectorIcon}</div>
            <div class="space-y-0.5 text-left">
              <span class="text-xs font-bold text-white block">${state.toast.title}</span>
              <span class="text-[11px] text-obsidian-400 block">${state.toast.message}</span>
            </div>
          </div>
        `;
      }

      let emailAlertModalHtml = "";
      if (state.showEmailAlertModal) {
        emailAlertModalHtml = `
          <div class="fixed inset-0 bg-obsidian-950/85 backdrop-blur-md z-50 flex items-center justify-center p-4 no-print" onclick="state.showEmailAlertModal = false; render();">
            <div class="w-full max-w-2xl bg-obsidian-900 border border-white/10 rounded-2xl overflow-hidden shadow-2xl" onclick="event.stopPropagation();">
              
              <!-- Modal Header -->
              <div class="px-6 py-4 bg-obsidian-950 border-b border-white/5 flex items-center justify-between">
                <div class="flex items-center gap-2 font-mono text-xs select-none">
                  <span class="text-gold-400">✉</span>
                  <h3 class="font-black uppercase text-gold-400 tracking-wider">
                    Simulated Email Dispatch Result
                  </h3>
                </div>
                <button onclick="state.showEmailAlertModal = false; render();" class="text-obsidian-500 hover:text-white transition px-2 py-1 text-[10px] uppercase font-bold bg-white/[0.02] border border-white/5 rounded-lg select-none cursor-pointer">
                  &#x2715; Close Preview
                </button>
              </div>

              <!-- Content Body -->
              <div class="p-6 space-y-4">
                <p class="text-[11px] text-obsidian-400 leading-relaxed text-left font-sans">
                  The Governance alert engine evaluated all active projects, consolidated milestones and imminent deadline warnings, and successfully routed the daily digest to the administrator's account below:
                </p>
                
                ${generateDailyEmailDigest()}
              </div>

              <!-- Footer Actions -->
              <div class="px-6 py-4 bg-obsidian-950/80 border-t border-white/5 flex items-center justify-end font-sans">
                <button onclick="state.showEmailAlertModal = false; render();" class="px-5 py-2 hover:bg-white/[0.05] border border-white/10 text-white hover:text-gold-400 active:translate-y-0.5 transition rounded-xl text-xs font-bold uppercase tracking-wider select-none cursor-pointer">
                  Great, Acknowledge
                </button>
              </div>

            </div>
          </div>
        `;
      }

      // Splice parts inside main interactive node
      container.innerHTML = `
        ${toastHtml}
        ${headerHtml}
        ${bodyWorkspace}
        ${drawerHtml}
        ${registerModalHtml}
        ${emailAlertModalHtml}
      `;

      // Restore dynamic user focus and caret cursor offsets
      if (activeId) {
        const restoredEl = document.getElementById(activeId);
        if (restoredEl) {
          try {
            restoredEl.focus();
            if (selectionStart !== null && selectionEnd !== null && (restoredEl.tagName === 'INPUT' || restoredEl.tagName === 'TEXTAREA')) {
              restoredEl.setSelectionRange(selectionStart, selectionEnd);
            }
          } catch (e) {}
        }
      }
    }

    function loadConfig() {
      fetch("config.json")
        .then(response => response.json())
        .then(data => {
          if (data && data.adminPassword) {
            if (!window.LCMotionConfig) {
              window.LCMotionConfig = {};
            }
            window.LCMotionConfig.adminPassword = data.adminPassword;
            console.log("Configuration successfully loaded dynamically.");
          }
        })
        .catch(err => {
          console.warn("External config.json fetch bypassed, fallback to script configuration.", err);
        });
    }

    // Initialize logic
    initDatabase();
    checkSession();
    loadConfig();
    render();
  </script>
</body>
</html>
